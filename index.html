<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Video</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        video {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 100%;
            object-fit: cover;
        }

        /* On portrait/narrow screens, cover crops too aggressively -
           switch to contain (letterboxed) so the whole frame is visible */
        @media (max-aspect-ratio: 1/1) {
            video {
                object-fit: contain;
            }
        }

        #unmute-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 6px;
            padding: 10px 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 14px;
            cursor: pointer;
        }

        #unmute-btn.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <video id="video" autoplay muted loop playsinline controls>
        <source src="assets/itsudemo.mp4" type="video/mp4">
        Sorry, your browser doesn't support embedded videos.
    </video>

</body>
</html>
