<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>heyy</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        video {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 100%;
            object-fit: contain;
        }

    </style>
</head>
<body>
    <video id="video" autoplay muted loop playsinline>
        <source src="assets/itsudemo.mp4" type="video/mp4">
        Sorry, your browser doesn't support embedded videos.
    </video>

    <script>
        var video = document.getElementById('video');

        var events = ['click', 'keydown'];

        function unmute(e) {
            if (e.preventDefault) e.preventDefault();
            video.currentTime = 0;
            video.muted = false;
            video.play().catch(function () {});
            events.forEach(function (evt) {
                document.removeEventListener(evt, unmute);
            });
        }

        events.forEach(function (evt) {
            document.addEventListener(evt, unmute, { once: true });
        });
    </script>
</body>
</html>
